name: Bug Report
description: Report a bug to help us improve NavHub
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        A clear and concise description of what the bug is.

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "How to reproduce the bug"
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What you expected to happen"
      placeholder: "Expected behavior was ..."

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happened"
      placeholder: "Actual behavior was ..."

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Browser, OS, Docker version, etc."
      placeholder: |
        - Browser:
        - OS:
        - Docker version:
        - Deployment method:

  - type: checkboxes
    id: checkbox
    attributes:
      label: "Checkboxes"
      options:
        - label: "I have searched existing issues and confirmed this is a bug"
          required: true
        - label: "I have tried the latest version"
          required: true