name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Frontend checks ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      # --- Go checks ---
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download Go dependencies
        run: go mod download

      - name: Run Go vet
        run: go vet ./...

      # --- Build Go binary ---
      - name: Build Go binary
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o navhub ./cmd/server