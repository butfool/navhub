name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./dev.db

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./dev.db
